name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "scispacy==0.5.4"
          pip install https://s3-us-west-2.amazonaws.com/ai2-s2-scispacy/releases/v0.5.4/en_core_sci_sm-0.5.4.tar.gz

      - name: Lint
        run: flake8 src/ tests/ --max-line-length=100

      - name: Format check
        run: black --check src/ tests/

      - name: Unit tests
        run: pytest tests/ --ignore=tests/smoke -v --tb=short --cov=src --cov-report=xml

      - name: Smoke tests (structured_only — no model download)
        run: pytest tests/smoke/test_smoke_structured_only.py -v --tb=short

      - name: Coverage report
        if: matrix.python-version == '3.11'
        run: pytest tests/ --ignore=tests/smoke --cov=src --cov-report=term-missing -q 2>&1 | tail -20
